<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="24" fill="#0a0e1a"/>
  <!-- Checkered flag pattern -->
  <g transform="translate(96,52)">
    <!-- Flag pole -->
    <rect x="-2" y="-10" width="4" height="90" fill="#666" rx="2"/>
    <!-- Flag body -->
    <g transform="translate(-40,-10)">
      <rect width="60" height="42" fill="#dc2626" rx="3"/>
      <!-- Checkered squares -->
      <rect x="0" y="0" width="10" height="10.5" fill="#fff"/>
      <rect x="20" y="0" width="10" height="10.5" fill="#fff"/>
      <rect x="40" y="0" width="10" height="10.5" fill="#fff"/>
      <rect x="10" y="10.5" width="10" height="10.5" fill="#fff"/>
      <rect x="30" y="10.5" width="10" height="10.5" fill="#fff"/>
      <rect x="50" y="10.5" width="10" height="10.5" fill="#fff"/>
      <rect x="0" y="21" width="10" height="10.5" fill="#fff"/>
      <rect x="20" y="21" width="10" height="10.5" fill="#fff"/>
      <rect x="40" y="21" width="10" height="10.5" fill="#fff"/>
      <rect x="10" y="31.5" width="10" height="10.5" fill="#fff"/>
      <rect x="30" y="31.5" width="10" height="10.5" fill="#fff"/>
      <rect x="50" y="31.5" width="10" height="10.5" fill="#fff"/>
    </g>
  </g>
  <!-- PCA Text -->
  <text x="96" y="158" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="36" fill="#ffffff" letter-spacing="4">PCA</text>
  <!-- Accent line -->
  <rect x="40" y="164" width="112" height="3" rx="1.5" fill="#dc2626"/>
</svg>
